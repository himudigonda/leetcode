name: Update LeetCode README

on:
  push:
    paths:
      - '**/*.py'
      - '**/*.cpp'
      - '**/*.java'
      - '**/*.sql'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.kt'
      - '**/*.go'
      - '**/*.rs'
      - '**/*.rb'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Run cleanup.py
      run: python3 cleanup.py

    - name: Commit and push changes if any
      run: |
        git config user.name "leetcode-bot"
        git config user.email "bot@users.noreply.github.com"
        git add README.md */*/ */
        if git diff --cached --quiet; then
          echo "✅ No changes to commit. Repo is up-to-date."
        else
          git commit -m "📊 Auto-update README and folder structure"
          git push
        fi
